services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      PORT: 8000
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api
    environment:
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - backend
